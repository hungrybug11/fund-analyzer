name: Daily Fund Analysis

on:
  schedule:
    - cron: "30 6 * * 1-5"
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas numpy pyarrow scipy plotly pyyaml jinja2

      - name: Sync config from portfolio
        run: python sync_mcp_to_config.py || echo "Sync failed, using existing config.yaml"

      - name: Run analysis
        run: |
          mkdir -p output
          python run.py || echo "Analysis failed, check logs"
        continue-on-error: true

      - name: Verify output exists
        run: |
          if [ -f output/report.html ]; then
            echo "Report generated successfully"
            ls -la output/
          else
            echo "Report not found, creating placeholder"
            echo "<html><body><h1>Analysis not available</h1><p>Check back later</p></body></html>" > output/report.html
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          disable_nojekyll: true
          commit_message: "Auto-report #${{ github.run_number }}"

      - name: Summary
        run: |
          echo "## 📊 今日基金分析报告" >> $GITHUB_STEP_SUMMARY
          echo "**分析时间**: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')" >> $GITHUB_STEP_SUMMARY
          echo "**📄 查看报告**: https://hungrybug11.github.io/fund-analyzer/report.html" >> $GITHUB_STEP_SUMMARY
