name: Daily Fund Analysis

on:
  schedule:
    # 每个交易日 14:30 北京时间 = 06:30 UTC (GitHub Actions 准点偏差 ±15分钟)
    - cron: "30 6 * * 1-5"
  workflow_dispatch:  # 允许手动触发

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pandas numpy pyarrow scipy plotly pyyaml jinja2

      - name: Run analysis
        run: python run.py
        continue-on-error: true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
          publish_branch: gh-pages
          keep_files: false
          commit_message: "Auto-report ${{ github.run_number }}"

      - name: Summary
        run: |
          echo "## 📊 今日基金分析" >> $GITHUB_STEP_SUMMARY
          echo "**分析时间**: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')" >> $GITHUB_STEP_SUMMARY
          echo "**查看报告**: https://${{ github.repository_owner }}.github.io/fund-analyzer/report.html" >> $GITHUB_STEP_SUMMARY
